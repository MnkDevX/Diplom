version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: crm_analyzer_db
    environment:
      POSTGRES_DB: crm_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    image: node:20
    container_name: crm_analyzer_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/crm_analyzer
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      - postgres

  frontend:
    image: node:20
    container_name: crm_analyzer_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm start"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
